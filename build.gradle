plugins {
    id 'java-library'
}

group 'se.alexanderjonsson'
version '0.1.1'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
    withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += [
            "-Xlint:all",
            "-Werror"
    ]
}

